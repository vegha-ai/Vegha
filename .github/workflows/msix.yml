name: MSIX

# Builds an MSIX bundle for the Microsoft Store.
#
# Triggers:
#   - Pushing a v*.*.* tag (the same trigger as release.yml). Tag drives the
#     version: v1.0.2 -> MSIX 1.0.2.0. This keeps the MSIX in lockstep with
#     the GitHub Release + Velopack installers.
#   - workflow_dispatch (optional version input). With no input, the script
#     reads the version from Directory.Build.props.
#
# Signing: the .msix is uploaded UNSIGNED as a workflow artifact. The
# maintainer downloads it and uploads to Partner Center, which signs on ingest.
on:
  # Called by release.yml (workflow_call) so a single manual release builds the
  # MSIX in lockstep, AND runnable standalone from the Actions tab. Never
  # auto-fires on tags/pushes/PRs.
  workflow_call:
    inputs:
      version:
        description: 'MSIX version (e.g. 1.0.2 or 1.0.2.0). Leave blank to use Directory.Build.props.'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'MSIX version (e.g. 1.0.2 or 1.0.2.0). Leave blank to use Directory.Build.props.'
        required: false
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # `inputs` is populated for BOTH workflow_call and workflow_dispatch.
          v="${{ inputs.version }}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved MSIX version: '$v' (blank = Pack-Msix.ps1 reads Directory.Build.props)"

      - name: Pack MSIX
        shell: pwsh
        run: |
          if ('${{ steps.ver.outputs.version }}') {
            ./eng/Pack-Msix.ps1 -Version '${{ steps.ver.outputs.version }}'
          } else {
            ./eng/Pack-Msix.ps1
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vegha-msix
          path: 'Vegha-*.msix'
          if-no-files-found: error
