name: MSIX

# Builds an MSIX bundle for the Microsoft Store. Triggers manually so the maintainer
# decides when to cut a Store release; signing happens in this workflow with a cert
# stored as a GitHub secret (PFX_BASE64 + PFX_PASSWORD). For the no-cert path the
# unsigned .msix is uploaded as a workflow artifact and the maintainer signs locally.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'MSIX version (e.g., 0.1.0.0)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack MSIX
        shell: pwsh
        run: ./eng/Pack-Msix.ps1 -Version ${{ github.event.inputs.version }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vegha-msix-${{ github.event.inputs.version }}
          path: 'Vegha-*.msix'
          if-no-files-found: error
